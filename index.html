<!DOCTYPE html> <!-- For structure: DOCTYPE is a declaration tells the browser which version of HTML the document is in. Html element represents the root element which contains all elements." -->
<html lang = "en">
    <!-- all other elements go here -->
    <head>
    <meta name ="viewport" content ="width=device-width, initial-scale=1.0"> <!-- The viewport meta tag is used to control the layout on mobile browsers. width=device-width sets the width of the page to follow the screen-width of the device (which will vary depending on the device). initial-scale=1.0 sets the initial zoom level when the page is first loaded by the browser. -->
    <meta charset = "Utf-8"> 
    <!-- Specifies the character encoding for the HTML document, utf-8 is the standard character encoding for web pages. 8-bit refers to variable-width encoding where 1 to 4 bytes(8 to 32 bits) are used to represent characters.-meta elements are void element that require no ending tag-->
    <title> A State Of Mine </title>
    <link rel ="stylesheet" href="ARTP.css"> <!-- link element is used to link external resources such as CSS files. rel attribute specifies the relationship between the current document and the linked resource, in this case, "stylesheet" indicates that the linked file is a CSS stylesheet. href attribute specifies the URL of the linked resource, in this case, "ARTP.css" is the name of the CSS file that contains the styles for this HTML document. -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="main.js" defer></script> <!-- script element is used to embed or reference executable code, typically JavaScript. src attribute specifies the URL of an external script file, in this case, "main.js" is the name of the JavaScript file that contains the code to be executed. -->
    </head>
